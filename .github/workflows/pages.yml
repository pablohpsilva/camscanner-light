name: Deploy website to GitHub Pages

# Publishes the static marketing site in apps/web/ to GitHub Pages.
# Site root maps to apps/web, so the pages are served at:
#   https://pablohpsilva.github.io/camscanner-light/            (marketing)
#   https://pablohpsilva.github.io/camscanner-light/support.html
#   https://pablohpsilva.github.io/camscanner-light/privacy.html
#
# One-time setup: repo Settings > Pages > Build and deployment >
#   Source = "GitHub Actions".

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
